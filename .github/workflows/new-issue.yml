name: New Issue

on:
  issues:
    types: [opened]


jobs:
  create-comment:
    runs-on: ubuntu-latest
    steps:
      - name: CreateComment
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            Hello @${{ github.event.issue.user.login }} 🙋‍♂️

            Some more text.
