name: 'Push Remote'
description: 'Push Remote'
inputs:
  internal-name:
    default: 'core'

  remote-branch: # id of input
    default: 'ix'

  commit_id:
    description: 'commit id'

  token:
    description: 'commit id'

runs:
  using: 'composite'
  steps:
    - name: Prepare ${{ inputs.remote-branch }} repo
      uses: actions/checkout@v3
      with:
        path: 'nightly_store_${{ inputs.remote-branch }}'
        ref: ${{ inputs.remote-branch }}
        repository: 'danielleroux/ix-nightlies'
        token: ${{ inputs.token }}
        fetch-depth: 0
        persist-credentials: true

    - name: Copy build files
      shell: bash
      run: |
        ROOT_PATH=$(pwd)
        cd ./packages/${{ inputs.internal-name }}
        TAR_FILE=$(pnpm pack)
        tar -xvf $TAR_FILE -C $ROOT_PATH/nightly_store_${{ inputs.remote-branch }}

    - name: Push to remote
      env:
        GIT_COMMIT_ID: ${{ inputs.commit_id }}
      shell: bash
      working-directory: nightly_store_${{ inputs.remote-branch }}
      run: |
        git ls-files -z | xargs -0 rm -rf
        git ls-tree --name-only -d -r -z HEAD | sort -rz | xargs -0 rmdir
        mv ./package/* .
        rm -rf package
        git config --global user.name "ix builder [bot]"
        git config --global user.email "<>"
        # git add -A
        # git commit -m "Nightly build $(date +"%Y-%m-%d %T") - $GIT_COMMIT_ID"
        # git push
        ls -la
